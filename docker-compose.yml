services:
  # PostgreSQL 17 Database
  postgres:
    image: postgres:17
    container_name: velue-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: velue_db
      POSTGRES_USER: velue_user
      POSTGRES_PASSWORD: velue_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - velue-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velue_user -d velue_db"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  velue-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
